# Google OIDC
quarkus.oidc.google.provider=google
quarkus.oidc.google.client-id=538726785952-jqvlb8h7bo2vp89go0ks5vnhimgd10a9.apps.googleusercontent.com
quarkus.oidc.google.credentials.secret=${QUARKUS_OIDC_CREDENTIALS_SECRET}
quarkus.oidc.google.authentication.scopes=openid,email,profile
quarkus.oidc.google.authentication.error-path=/sign-in
quarkus.oidc.google.authentication.redirect-path=/api/auth/callback/google
# Default OIDC settings
quarkus.oidc.application-type=web-app
# Database
quarkus.datasource.db-kind=h2
quarkus.datasource.username=oppshan-files
quarkus.datasource.password=oppshan-files oppshan-files
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/${quarkus.application.name};CIPHER=AES;AUTO_RECONNECT=TRUE;ACCESS_MODE_DATA=rws;TIME ZONE=UTC;MODE=MySQL
# Jacoco
quarkus.jacoco.report=true
# JPA
quarkus.hibernate-orm.dev-ui.allow-hql=true
quarkus.hibernate-orm.fetch.batch-size=25
quarkus.hibernate-orm.jdbc.statement-batch-size=25
quarkus.hibernate-orm.jdbc.statement-fetch-size=25
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.queries-slower-than-ms=1000
quarkus.hibernate-orm.log.jdbc-warnings=true
quarkus.hibernate-orm.request-scoped.enabled=false
quarkus.hibernate-orm.second-level-caching-enabled=false
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.schema-management.create-schemas=true
quarkus.hibernate-orm.schema-management.halt-on-error=true
# Application settings
app.storage.max-bytes=1000000